<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To-Do List App</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header class="app-header">
      <h1>To-Do List App</h1>
      <p>Manage your tasks with CRUD operations, filters, and localStorage.</p>
    </header>

    <section class="todo-input-section">
      <input
        type="text"
        id="taskInput"
        placeholder="Enter a new task"
        autocomplete="off"
      />
      <button id="addTaskBtn">Add Task</button>
    </section>

    <section class="filter-section">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="active">Active</button>
      <button class="filter-btn" data-filter="completed">Completed</button>
    </section>

    <section class="task-summary">
      <p>Total: <span id="totalCount">0</span></p>
      <p>Active: <span id="activeCount">0</span></p>
      <p>Completed: <span id="completedCount">0</span></p>
    </section>

    <ul id="taskList"></ul>

    <section class="bottom-actions">
      <button id="clearCompletedBtn">Clear Completed</button>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
